name: 코스피200 상승전환 알림

# 매일 자동 실행 + 수동 실행 버튼
on:
  schedule:
    # cron은 UTC 기준. 한국시간(KST)은 UTC+9.
    # 아래는 UTC 09:00 = 한국 18:00 (장 마감 후). 시간 바꾸려면 아래 숫자만 수정.
    - cron: '0 9 * * 1-5'   # 월~금, 한국시간 오후 6시
  workflow_dispatch:        # 깃허브에서 수동 실행도 가능

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 스캔 후 텔레그램 발송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
        run: python notify.py
